services:
  - type: web
    name: nexus-prediction-market
    env: node
    plan: free # Can be 'starter' for more power
    buildCommand: pnpm install && pnpm build && pnpm drizzle-kit push
    startCommand: pnpm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false # Set in Render Dashboard
      - key: DATABASE_AUTH_TOKEN
        sync: false # Set in Render Dashboard
      - key: OPENAI_API_KEY
        sync: false
      - key: SESSION_SECRET
        sync: false
      - key: PORT
        value: 10000
      - key: BINARY_MARKET_ADDRESS
        sync: false
      - key: COPY_TRADING_VAULT_ADDRESS
        sync: false
